name: Release

# Runs on every push to main and when a version tag (v*.*.*) is pushed.
on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

# ---------------------------------------------------------------------------
# Environment
# ---------------------------------------------------------------------------
env:
  PLUGIN_SLUG: upi-smartpay
  MAIN_FILE:   pmpk-upi-smartpay.php

# ---------------------------------------------------------------------------
jobs:
# ---------------------------------------------------------------------------

  # =========================================================================
  # 1. PHP Syntax — run against multiple PHP versions
  # =========================================================================
  php-lint:
    name: PHP Lint (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['7.4', '8.0', '8.1', '8.2', '8.3']

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Syntax check all .php files
        run: |
          ERRORS=0
          while IFS= read -r -d '' file; do
            php -l "$file" > /dev/null 2>&1 || { echo "SYNTAX ERROR: $file"; ERRORS=$((ERRORS+1)); }
          done < <(find . -name "*.php" -not -path "*/vendor/*" -print0)
          [ "$ERRORS" -eq 0 ] && echo "✅ All PHP files passed syntax check." || exit 1

  # =========================================================================
  # 2. WordPress Coding Standards (PHPCS)
  # =========================================================================
  phpcs:
    name: WordPress Coding Standards
    runs-on: ubuntu-latest
    needs: php-lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer
          coverage: none

      - name: Install PHPCS + WordPress standards
        run: |
          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require squizlabs/php_codesniffer
          composer global require wp-coding-standards/wpcs

      - name: Run PHPCS
        run: |
          phpcs \
            --standard=WordPress \
            --extensions=php \
            --ignore=*/vendor/* \
            --report=summary \
            .
        continue-on-error: true   # Report but don't block release on style warnings.

  # =========================================================================
  # 3. Build — create distributable ZIP
  # =========================================================================
  build:
    name: Build Plugin ZIP
    runs-on: ubuntu-latest
    needs: [php-lint, phpcs]

    outputs:
      zip-name: ${{ steps.meta.outputs.zip_name }}
      version:  ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from plugin header
        id: meta
        run: |
          VERSION=$(grep -m1 "^\s*\*\s*Version:" "${{ env.MAIN_FILE }}" \
            | sed 's/.*Version:\s*//' | tr -d '[:space:]')
          echo "version=${VERSION}"                                    >> "$GITHUB_OUTPUT"
          echo "zip_name=${{ env.PLUGIN_SLUG }}-${VERSION}.zip"       >> "$GITHUB_OUTPUT"
          echo "Plugin version: ${VERSION}"

      - name: Build ZIP (exclude dev-only files)
        run: |
          # Zip the contents so the plugin installs into upi-smartpay/ in WP.
          mkdir -p dist/${{ env.PLUGIN_SLUG }}
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='dist' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='.phpcs.xml' \
            --exclude='phpunit.xml' \
            --exclude='tests' \
            --exclude='Makefile' \
            --exclude='*.DS_Store' \
            ./ dist/${{ env.PLUGIN_SLUG }}/

          cd dist
          zip -r "../${{ steps.meta.outputs.zip_name }}" ${{ env.PLUGIN_SLUG }}/
          cd ..
          echo "✅ ZIP created: ${{ steps.meta.outputs.zip_name }}"

      - name: Verify ZIP contents
        run: unzip -l "${{ steps.meta.outputs.zip_name }}" | head -40

      - name: Upload ZIP as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zip
          path: ${{ steps.meta.outputs.zip_name }}
          retention-days: 30

  # =========================================================================
  # 4. GitHub Release — only on version tags
  # =========================================================================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download ZIP artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-zip

      - name: Parse changelog for this version
        id: changelog
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          NOTES=$(awk "/^= ${VERSION} =/,/^= [0-9]/" readme.txt \
            | grep -v "^= ${VERSION}" \
            | grep -v "^= [0-9]" \
            | sed '/^[[:space:]]*$/d' \
            | head -25)
          {
            echo "notes<<EOF"
            echo "${NOTES:-See readme.txt for full changelog.}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ github.ref_name }}
          name:       "UPI SmartPay v${{ needs.build.outputs.version }}"
          body: |
            ## What's New

            ${{ steps.changelog.outputs.notes }}

            ---

            **Install:** Download the ZIP below → *WP Admin → Plugins → Add New → Upload Plugin*.

            **Links:**
            - 📖 [Documentation](https://www.pmpksamy.com/plugins/upi-smartpay)
            - 🔷 [WordPress.org](https://wordpress.org/plugins/upi-smartpay/)
            - 🌐 [Developer Website](https://www.pmpksamy.com)
            - 📱 [Social Hub](https://www.iampmpksamy.social)

            ---
            *Developed by [Maalig (iampmpksamy)](https://www.pmpksamy.com)*
          files:      ${{ needs.build.outputs.zip-name }}
          draft:      false
          prerelease: false
