name: Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

env:
  PLUGIN_SLUG: upi-smartpay
  MAIN_FILE: pmpk-upi-smartpay.php

jobs:

# =========================
# 1. PHP LINT
# =========================
  php-lint:
    name: PHP Lint
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version: ['7.4', '8.0', '8.1', '8.2', '8.3']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}

      - name: Run PHP Lint
        run: find . -type f -name "*.php" -exec php -l {} \;


# =========================
# 2. WORDPRESS CODING STANDARDS (SAFE VERSION)
# =========================
  phpcs:
    name: WordPress Coding Standards
    runs-on: ubuntu-latest
    needs: php-lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP + Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.1
          tools: composer

      - name: Install PHPCS (stable combo)
        run: |
          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true

          composer global require squizlabs/php_codesniffer:^3.7
          composer global require wp-coding-standards/wpcs:^3.0

          ~/.composer/vendor/bin/phpcs --config-set installed_paths \
          ~/.composer/vendor/wp-coding-standards/wpcs

      - name: Run PHPCS (non-blocking)
        run: |
          ~/.composer/vendor/bin/phpcs \
          --standard=WordPress \
          --extensions=php \
          . || true


# =========================
# 3. BUILD PLUGIN ZIP
# =========================
  build:
    name: Build Plugin ZIP
    runs-on: ubuntu-latest
    needs: phpcs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Prepare Plugin Folder
        run: |
          mkdir $PLUGIN_SLUG
          rsync -av \
            --exclude='.git*' \
            --exclude='node_modules' \
            --exclude='.github' \
            ./ $PLUGIN_SLUG/

      - name: Create ZIP
        run: |
          zip -r $PLUGIN_SLUG-$VERSION.zip $PLUGIN_SLUG

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zip
          path: ${{ env.PLUGIN_SLUG }}-${{ env.VERSION }}.zip


# =========================
# 4. CREATE RELEASE (ONLY ON TAG)
# =========================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download ZIP
        uses: actions/download-artifact@v4
        with:
          name: plugin-zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: UPI SmartPay v${{ github.ref_name }}
          files: ${{ env.PLUGIN_SLUG }}-${{ env.VERSION }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}